<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Even or Odd Number Checker</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f8ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        text-align: center;
        width: 320px;
    }

    h2 {
        color: #333;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 15px 0;
        font-size: 16px;
    }

    button {
        background-color: #007BFF;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
    }

    button:hover {
        background-color: #0056b3;
    }

    #result {
        margin-top: 20px;
        font-size: 18px;
        font-weight: bold;
        color: green;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Even or Odd Number Checker</h2>

    <input type="number" id="number" placeholder="Enter a number">

    <br>

    <button onclick="checkNumber()">Check</button>

    <p id="result"></p>
</div>

<script>
function checkNumber() {
    let num = document.getElementById("number").value;
    let result = document.getElementById("result");

    if (num === "") {
        result.innerHTML = "Please enter a number.";
    }
    else if (num % 2 === 0) {
        result.innerHTML = num + " is an Even Number.";
    }
    else {
        result.innerHTML = num + " is an Odd Number.";
    }
}
</script>

</body>
</html>
