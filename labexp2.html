<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechStore</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      background-color: #1a1a2e;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
    }

    nav .logo {
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 24px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 15px;
    }

    nav ul li a:hover { text-decoration: underline; }

    main {
      flex: 1;
      padding: 40px 60px;
    }

    .product-grid {
      display: flex;
      gap: 28px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
      width: 300px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 14px;
      color: #555;
      margin-bottom: 12px;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .price {
      font-size: 16px;
      font-weight: bold;
      color: #111;
    }

    .badge {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }

    .badge.new { background-color: #28a745; }
    .badge.sale { background-color: #dc3545; }

    .btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 22px;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn:hover { background-color: #0056b3; }

    footer {
      background-color: #1a1a2e;
      color: #ccc;
      text-align: center;
      padding: 18px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">TechStore</div>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <main>
    <div class="product-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&q=80" alt="Laptop"/>
        <h2>Laptop</h2>
        <p>High performance laptop</p>
        <div class="price-row">
          <span class="price">₹50,000</span>
          <span class="badge new">New</span>
        </div>
        <button class="btn">View Details</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1678685888221-cda773a3dcdb?w=400&q=80" alt="Mobile"/>
        <h2>Mobile</h2>
        <p>Latest smartphone</p>
        <div class="price-row">
          <span class="price">₹30,000</span>
          <span class="badge sale">Sale</span>
        </div>
        <button class="btn">View Details</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&q=80" alt="Headphones"/>
        <h2>Headphones</h2>
        <p>Noise cancelling</p>
        <div class="price-row">
          <span class="price">₹5,000</span>
          <span class="badge new">New</span>
        </div>
        <button class="btn">View Details</button>
      </div>

    </div>
  </main>

  <footer>
    &copy; 2026 TechStore | Follow us on social media
  </footer>

  <h1>Srishti Gupta</h1>
  <h1>ELCE-1</h1>
  <h1>2503204000032</h1>

</body>
</html>
