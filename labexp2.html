<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    nav {
      background-color: #1a1a2e;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
    }

    nav .logo {
      font-size: 20px;
      font-weight: bold;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 24px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    nav ul li a:hover {
      text-decoration: underline;
    }

    main {
      flex: 1;
      padding: 40px;
    }

    .product-grid {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .card {
      width: 300px;
      background: white;
      border: 1px solid lightgray;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
    }

    .card h2 {
      margin: 15px 0 8px;
    }

    .card p {
      color: gray;
      margin-bottom: 12px;
    }

    .price-row {
      margin-bottom: 15px;
    }

    .price {
      font-weight: bold;
      font-size: 18px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 4px;
      color: white;
      font-size: 12px;
      margin-left: 10px;
    }

    .new {
      background: green;
    }

    .sale {
      background: red;
    }

    .btn {
      background: blue;
      color: white;
      border: none;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 5px;
    }

    .btn:hover {
      background: darkblue;
    }

    footer {
      background: #1a1a2e;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">TechStore</div>

  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Products</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<main>

<div class="product-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=400&q=80">
<h2>Laptop</h2>
<p>High Performance Laptop</p>

<div class="price-row">
<span class="price">₹50,000</span>
<span class="badge new">New</span>
</div>

<button class="btn" onclick="showDetails('Laptop')">
View Details
</button>

</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1678685888221-cda773a3dcdb?w=400&q=80">
<h2>Mobile</h2>
<p>Latest Smartphone</p>

<div class="price-row">
<span class="price">₹30,000</span>
<span class="badge sale">Sale</span>
</div>

<button class="btn" onclick="showDetails('Mobile')">
View Details
</button>

</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&q=80">
<h2>Headphones</h2>
<p>Noise Cancelling</p>

<div class="price-row">
<span class="price">₹5,000</span>
<span class="badge new">New</span>
</div>

<button class="btn" onclick="showDetails('Headphones')">
View Details
</button>

</div>

</div>

</main>

<footer>
© 2026 TechStore | Follow us on Social Media
</footer>

<h2>Srishti Gupta</h2>
<h2>ELCE-1</h2>
<h2>2503204000032</h2>

<!-- Internal JavaScript -->
<script>

function showDetails(product){

    if(product=="Laptop"){

        alert("Laptop\n\nPrice : ₹50,000\nProcessor : Intel Core i7\nRAM : 16GB\nStorage : 512GB SSD");

    }

    else if(product=="Mobile"){

        alert("Mobile\n\nPrice : ₹30,000\nRAM : 8GB\nStorage : 128GB\nCamera : 50MP");

    }

    else if(product=="Headphones"){

        alert("Headphones\n\nPrice : ₹5,000\nBluetooth : 5.3\nBattery : 30 Hours\nNoise Cancelling");

    }

}

</script>

</body>
</html>
